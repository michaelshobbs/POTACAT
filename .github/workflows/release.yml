name: Build & Release

# Triggers on a v*.*.* tag push or manual dispatch.
# To release: bump package.json, commit, tag, push tag:
#   git tag v1.6.0 && git push origin v1.6.0
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.6.0). Must match package.json.'
        required: true
        type: string

permissions:
  contents: write # needed to create the GitHub release and upload assets

jobs:
  # --------------------------------------------------------------------------
  # Parallel platform builds
  # --------------------------------------------------------------------------

  build-windows:
    # Pin to windows-2022. GitHub flipped windows-latest to Windows Server
    # 2025 (build 10.0.26100) on 2026-05-05, and the new image's Visual
    # Studio layout doesn't satisfy node-gyp's heuristics — @electron/rebuild
    # of @serialport/bindings-cpp fails with "Could not find any Visual
    # Studio installation to use". v1.5.14 (May 4, on the old image) was
    # fine; v1.5.15 (May 5, on the new image) failed. Re-evaluate when
    # windows-2022 is retired.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Build native addons
        run: npm run build-natives
        continue-on-error: true # native build failures don't block the release
      - name: Build Windows installers
        # --publish never: electron-builder sees the git tag and otherwise
        # tries to auto-publish to GitHub. The create-release job handles
        # uploads explicitly so we disable the implicit behavior here.
        run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: |
            dist/POTACAT-Setup-*.exe
            dist/POTACAT-Portable-*.exe
            dist/latest.yml
          if-no-files-found: error

  # macOS Apple Silicon (arm64).
  build-macos-arm64:
    runs-on: macos-latest # arm64 on the M-series runner image
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Build native addons
        run: npm run build-natives
        continue-on-error: true
      - name: Bundle hamlib into assets/hamlib/
        run: |
          set -e
          brew install hamlib
          HAMLIB_PREFIX=$(brew --prefix hamlib)
          rm -f assets/hamlib/*.dll assets/hamlib/*.exe
          cp "$HAMLIB_PREFIX/bin/rigctld" assets/hamlib/rigctld
          chmod +x assets/hamlib/rigctld
          copy_deps() {
            local bin="$1"
            for dep in $(otool -L "$bin" | awk 'NR>1 && /\.dylib/ {print $1}' | grep -E "(hamlib|libusb)" | grep -v "$(basename $bin)" || true); do
              local name=$(basename "$dep")
              if [ ! -f "assets/hamlib/$name" ]; then
                cp "$dep" "assets/hamlib/$name" 2>/dev/null || continue
                chmod +w "assets/hamlib/$name"
                copy_deps "assets/hamlib/$name"
              fi
              install_name_tool -change "$dep" "@loader_path/$name" "$bin" || true
            done
          }
          copy_deps assets/hamlib/rigctld
          for lib in assets/hamlib/*.dylib; do
            install_name_tool -id "@loader_path/$(basename $lib)" "$lib" || true
          done
          ls -la assets/hamlib/
      - name: Build macOS dmg (arm64)
        run: npx electron-builder --mac --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos-arm64
          path: |
            dist/POTACAT-*-arm64.dmg
            dist/POTACAT-*-arm64.dmg.blockmap
            dist/latest-mac.yml
          if-no-files-found: error

  # macOS Intel (x86_64). The bare `macos-N` labels (no `-arm64` suffix) are
  # Intel; `macos-N-arm64` and `macos-latest` are Apple Silicon. macos-13 was
  # retired in early 2026; macos-14 is the current Intel image and is itself
  # scheduled for full deprecation by Nov 2026, after which the path forward
  # is a universal DMG cross-compiled from arm64.
  build-macos-x64:
    runs-on: macos-14 # Intel x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Build native addons
        run: npm run build-natives
        continue-on-error: true
      - name: Bundle hamlib into assets/hamlib/
        # Same logic as the arm64 job — brew on macos-13 resolves the
        # Intel-arch hamlib formula automatically.
        run: |
          set -e
          brew install hamlib
          HAMLIB_PREFIX=$(brew --prefix hamlib)
          rm -f assets/hamlib/*.dll assets/hamlib/*.exe
          cp "$HAMLIB_PREFIX/bin/rigctld" assets/hamlib/rigctld
          chmod +x assets/hamlib/rigctld
          copy_deps() {
            local bin="$1"
            for dep in $(otool -L "$bin" | awk 'NR>1 && /\.dylib/ {print $1}' | grep -E "(hamlib|libusb)" | grep -v "$(basename $bin)" || true); do
              local name=$(basename "$dep")
              if [ ! -f "assets/hamlib/$name" ]; then
                cp "$dep" "assets/hamlib/$name" 2>/dev/null || continue
                chmod +w "assets/hamlib/$name"
                copy_deps "assets/hamlib/$name"
              fi
              install_name_tool -change "$dep" "@loader_path/$name" "$bin" || true
            done
          }
          copy_deps assets/hamlib/rigctld
          for lib in assets/hamlib/*.dylib; do
            install_name_tool -id "@loader_path/$(basename $lib)" "$lib" || true
          done
          ls -la assets/hamlib/
      - name: Build macOS dmg (x64)
        # electron-builder writes a separate latest-mac-x64.yml so the
        # auto-updater can serve the right binary per host arch.
        run: npx electron-builder --mac --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos-x64
          path: |
            dist/POTACAT-*.dmg
            dist/POTACAT-*.dmg.blockmap
            dist/latest-mac*.yml
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install system build deps
        # Ubuntu-latest (24.04) ships hamlib 4.5.5, which predates FTX-1
        # support (added in hamlib 4.6, Sept 2024 — royw3888 report).
        # We build hamlib from source below to guarantee a current backend
        # set in the bundled rigctld.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential python3 libudev-dev cmake rpm patchelf \
            autoconf automake libtool texinfo pkg-config \
            libusb-1.0-0-dev libreadline-dev libxml2-dev \
            libasound2-dev
      - name: Build hamlib from source
        env:
          HAMLIB_VERSION: '4.7.1'
        run: |
          set -e
          curl -fsSL "https://github.com/Hamlib/Hamlib/archive/refs/tags/${HAMLIB_VERSION}.tar.gz" -o /tmp/hamlib.tar.gz
          mkdir -p /tmp/hamlib-src
          tar -xzf /tmp/hamlib.tar.gz -C /tmp/hamlib-src --strip-components=1
          cd /tmp/hamlib-src
          ./bootstrap
          ./configure --prefix=/usr/local --disable-static --enable-shared \
            --without-cxx-binding --disable-doxygen-doc
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig
          /usr/local/bin/rigctld --version
          # Sanity check — fail the build if FTX-1 isn't in the model list,
          # which is the whole point of building from source.
          /usr/local/bin/rigctl --list | grep -i 'FTX-1' || (echo "FTX-1 missing from rigctl --list" && exit 1)
      - name: Install dependencies
        run: npm install
      - name: Build native addons
        run: npm run build-natives
        continue-on-error: true
      - name: Bundle hamlib into assets/hamlib/
        # Replaces Windows binaries with the freshly-built Linux rigctld
        # + its hamlib/libusb deps, rewriting RPATH to $ORIGIN so libs
        # resolve next to the binary.
        run: |
          set -e
          rm -f assets/hamlib/*.dll assets/hamlib/*.exe
          cp /usr/local/bin/rigctld assets/hamlib/rigctld
          chmod +x assets/hamlib/rigctld
          for dep in $(ldd /usr/local/bin/rigctld | awk '/(hamlib|libusb)/ {print $3}'); do
            if [ -f "$dep" ]; then
              cp -L "$dep" "assets/hamlib/$(basename $dep)"
            fi
          done
          patchelf --set-rpath '$ORIGIN' assets/hamlib/rigctld
          for lib in assets/hamlib/*.so*; do
            [ -f "$lib" ] && patchelf --set-rpath '$ORIGIN' "$lib" 2>/dev/null || true
          done
          ls -la assets/hamlib/
      - name: Build Linux packages
        run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: |
            dist/POTACAT-*.AppImage
            dist/potacat_*.deb
            dist/potacat-*.rpm
            dist/latest-linux.yml
          if-no-files-found: error

  # Linux arm64 (aarch64) — Raspberry Pi / sBitx / other ARM SBCs.
  # Native build on GitHub's free public-repo ARM runner; no QEMU cross-compile.
  # Modern Raspberry Pi OS is 64-bit, so arm64 is the right (and only) ARM
  # target — Electron no longer ships 32-bit armv7l Linux binaries.
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential python3 libudev-dev cmake rpm patchelf \
            autoconf automake libtool texinfo pkg-config \
            libusb-1.0-0-dev libreadline-dev libxml2-dev \
            libasound2-dev
      - name: Build hamlib from source
        env:
          HAMLIB_VERSION: '4.7.1'
        run: |
          set -e
          curl -fsSL "https://github.com/Hamlib/Hamlib/archive/refs/tags/${HAMLIB_VERSION}.tar.gz" -o /tmp/hamlib.tar.gz
          mkdir -p /tmp/hamlib-src
          tar -xzf /tmp/hamlib.tar.gz -C /tmp/hamlib-src --strip-components=1
          cd /tmp/hamlib-src
          ./bootstrap
          ./configure --prefix=/usr/local --disable-static --enable-shared \
            --without-cxx-binding --disable-doxygen-doc
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig
          /usr/local/bin/rigctld --version
          /usr/local/bin/rigctl --list | grep -i 'FTX-1' || (echo "FTX-1 missing from rigctl --list" && exit 1)
      - name: Install dependencies
        run: npm install
      - name: Build native addons
        run: npm run build-natives
        continue-on-error: true
      - name: Bundle hamlib into assets/hamlib/
        run: |
          set -e
          rm -f assets/hamlib/*.dll assets/hamlib/*.exe
          cp /usr/local/bin/rigctld assets/hamlib/rigctld
          chmod +x assets/hamlib/rigctld
          for dep in $(ldd /usr/local/bin/rigctld | awk '/(hamlib|libusb)/ {print $3}'); do
            if [ -f "$dep" ]; then
              cp -L "$dep" "assets/hamlib/$(basename $dep)"
            fi
          done
          patchelf --set-rpath '$ORIGIN' assets/hamlib/rigctld
          for lib in assets/hamlib/*.so*; do
            [ -f "$lib" ] && patchelf --set-rpath '$ORIGIN' "$lib" 2>/dev/null || true
          done
          ls -la assets/hamlib/
      - name: Build Linux packages (arm64)
        run: npx electron-builder --linux --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-arm64
          path: |
            dist/POTACAT-*-arm64.AppImage
            dist/potacat_*_arm64.deb
            dist/potacat-*.aarch64.rpm
            dist/latest-linux-arm64.yml
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Collect artifacts + create the GitHub release
  # --------------------------------------------------------------------------

  create-release:
    needs: [build-windows, build-macos-arm64, build-macos-x64, build-linux, build-linux-arm64]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gh can auto-generate notes
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release for v$VERSION"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-download
          merge-multiple: true
      - name: Stage artifacts in dist/
        run: |
          mkdir -p dist
          cp -v dist-download/* dist/ || true
          ls -la dist/
      - name: Create GitHub release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          # If a release notes file is checked in at release-notes/vX.Y.Z.md, use it.
          # Otherwise let gh auto-generate from commits since the previous tag.
          NOTES_FILE="release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              dist/POTACAT-Setup-*.exe dist/POTACAT-Portable-*.exe \
              dist/POTACAT-*.dmg \
              dist/POTACAT-*.AppImage dist/potacat_*.deb dist/potacat-*.rpm \
              dist/latest*.yml 2>/dev/null || \
            gh release upload "$TAG" \
              dist/POTACAT-Setup-*.exe dist/POTACAT-Portable-*.exe \
              dist/POTACAT-*.dmg \
              dist/POTACAT-*.AppImage dist/potacat_*.deb dist/potacat-*.rpm \
              dist/latest*.yml --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              dist/POTACAT-Setup-*.exe dist/POTACAT-Portable-*.exe \
              dist/POTACAT-*.dmg \
              dist/POTACAT-*.AppImage dist/potacat_*.deb dist/potacat-*.rpm \
              dist/latest*.yml 2>/dev/null || \
            gh release upload "$TAG" \
              dist/POTACAT-Setup-*.exe dist/POTACAT-Portable-*.exe \
              dist/POTACAT-*.dmg \
              dist/POTACAT-*.AppImage dist/potacat_*.deb dist/potacat-*.rpm \
              dist/latest*.yml --clobber
          fi

  # --------------------------------------------------------------------------
  # Update the website to point at the new installers
  # --------------------------------------------------------------------------

  update-website:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout POTACAT (for the update script)
        uses: actions/checkout@v4
        with:
          path: potacat
      - name: Checkout potacat-website
        uses: actions/checkout@v4
        with:
          repository: Waffleslop/potacat-website
          token: ${{ secrets.WEBSITE_UPDATE_TOKEN }}
          path: website
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Update download links in index.html
        run: node potacat/scripts/update-website-links.js "${{ needs.create-release.outputs.version }}" website/index.html
      - name: Commit and push
        working-directory: website
        run: |
          git config user.name "POTACAT Release Bot"
          git config user.email "noreply@potacat.com"
          if git diff --quiet; then
            echo "No website changes (already up to date)"
            exit 0
          fi
          git add index.html
          git commit -m "Update download links to v${{ needs.create-release.outputs.version }}"
          git push
