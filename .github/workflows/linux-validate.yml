name: Linux build (validation)

# Manual-trigger Linux-only build that does not create a GitHub release —
# uploads the AppImage + .deb as a workflow artifact instead. Used to
# hand a test build to a Linux user (e.g. for ALSA-addon validation
# on real Pi hardware) before tagging a real release.
#
# Run via the Actions tab → "Linux build (validation)" → Run workflow,
# or programmatically with `gh workflow run linux-validate.yml`.

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Short note about what's being validated (shows in run history)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-linux-validate:
    # 22.04 (glibc 2.35) so validation matches the release runner — the
    # alsa_native addon needs to load on Raspberry Pi OS Bookworm
    # (glibc 2.36), which means it can only require symbols <= 2.35.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system build deps
        # libasound2-dev added for the alsa_native addon link step.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential python3 libudev-dev cmake rpm patchelf \
            autoconf automake libtool texinfo pkg-config \
            libusb-1.0-0-dev libreadline-dev libxml2-dev \
            libasound2-dev

      - name: Build hamlib from source
        env:
          HAMLIB_VERSION: '4.7.1'
        run: |
          set -e
          curl -fsSL "https://github.com/Hamlib/Hamlib/archive/refs/tags/${HAMLIB_VERSION}.tar.gz" -o /tmp/hamlib.tar.gz
          mkdir -p /tmp/hamlib-src
          tar -xzf /tmp/hamlib.tar.gz -C /tmp/hamlib-src --strip-components=1
          cd /tmp/hamlib-src
          ./bootstrap
          ./configure --prefix=/usr/local --disable-static --enable-shared \
            --without-cxx-binding --disable-doxygen-doc
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig
          /usr/local/bin/rigctld --version

      - name: Install dependencies
        run: npm install

      - name: Build native addons
        # The whole point of this workflow — verify that alsa_native
        # links against libasound on the runner. Failure here is the
        # signal we're hunting for.
        run: npm run build-natives

      - name: Confirm alsa_native landed
        run: |
          set -e
          ls -la lib/alsa_native/build/Release/
          file lib/alsa_native/build/Release/alsa_native.node
          ADDON=lib/alsa_native/build/Release/alsa_native.node
          MAX_GLIBC=$(objdump -T "$ADDON" 2>/dev/null | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -V | tail -1)
          echo "Highest GLIBC symbol required by addon: ${MAX_GLIBC:-none}"
          if [ -n "$MAX_GLIBC" ]; then
            MAX_NUM=$(echo "$MAX_GLIBC" | sed 's/GLIBC_//')
            if [ "$(printf '%s\n%s\n' "$MAX_NUM" "2.35" | sort -V | tail -1)" != "2.35" ]; then
              echo "FAIL: addon requires $MAX_GLIBC > GLIBC_2.35 — won't load on Bookworm-class distros"
              exit 1
            fi
          fi
          # Three-stage smoke test:
          #   1) dlopen the addon (catches libasound link failures)
          #   2) enumerate devices (exercises the read side of the addon)
          #   3) openCapture against the always-present "null" PCM
          #      (exercises snd_pcm_hw_params_* — where HA3HZ's
          #      "undefined symbol: alloca" lived in v1.5.25). Without
          #      this third step, alloca was lazy-bound and the
          #      validate workflow never demanded the symbol.
          node -e "
            const a = require('./lib/alsa');
            console.log('alsa available:', a.isAvailable(), 'version:', a._alsaVersion(), 'platform:', a._platform());
            const devs = a.getDevices();
            console.log('enumerated', devs.length, 'devices');
            const native = require('./lib/alsa_native/build/Release/alsa_native.node');
            const cap = native.openCapture('null', { rate: 48000, channels: 1, periodFrames: 1024, bufferFrames: 4096 });
            console.log('openCapture(null) ok — handle=', cap.handle, 'rate=', cap.rate, 'channels=', cap.channels);
            native.closeCapture(cap.handle);
            console.log('closeCapture ok');
          "

      - name: Bundle hamlib into assets/hamlib/
        run: |
          set -e
          rm -f assets/hamlib/*.dll assets/hamlib/*.exe
          cp /usr/local/bin/rigctld assets/hamlib/rigctld
          chmod +x assets/hamlib/rigctld
          for dep in $(ldd /usr/local/bin/rigctld | awk '/(hamlib|libusb)/ {print $3}'); do
            if [ -f "$dep" ]; then
              cp -L "$dep" "assets/hamlib/$(basename $dep)"
            fi
          done
          patchelf --set-rpath '$ORIGIN' assets/hamlib/rigctld
          for lib in assets/hamlib/*.so*; do
            [ -f "$lib" ] && patchelf --set-rpath '$ORIGIN' "$lib" 2>/dev/null || true
          done
          ls -la assets/hamlib/

      - name: Build Linux packages
        # AppImage + deb + rpm — the same artifacts the real release
        # workflow produces, just without the GH release upload step.
        run: npx electron-builder --linux --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: potacat-linux-validation
          path: |
            dist/POTACAT-*.AppImage
            dist/potacat_*.deb
            dist/potacat-*.rpm
          if-no-files-found: error
          retention-days: 30

  # ── Chromium sandbox smoke test (GitHub issue #37) ───────────────────
  # Runs the freshly built artifacts on ubuntu-24.04 — the OS whose
  # AppArmor userns restriction triggered the "chrome-sandbox must be
  # setuid root" abort. Three scenarios:
  #   1. deb on Ubuntu 24.04: AppArmor profile installed, chrome-sandbox
  #      NOT setuid, app launches fully sandboxed (no fallback warning).
  #   2. deb with unprivileged userns disabled entirely (hardened-Debian
  #      simulation via kernel.unprivileged_userns_clone=0): app must
  #      still launch, via the logged --no-sandbox fallback.
  #   3. AppImage on Ubuntu 24.04 (no profile possible): app must still
  #      launch, via the logged --no-sandbox fallback. Pre-fix builds
  #      abort in seconds here.
  # "Launches" = the --headless process is still alive when a 25s
  # timeout kills it (exit 124) — the sandbox abort happens within the
  # first seconds of Chromium startup.
  sandbox-smoke:
    needs: build-linux-validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: potacat-linux-validation
          path: dist

      - name: Install runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2t64 xvfb libasound2t64

      - name: Enable the Ubuntu 24.04 userns restriction
        # GitHub runners may relax it for CI compatibility — force the
        # stock-desktop value the bug reports come from.
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=1
          sysctl kernel.apparmor_restrict_unprivileged_userns
          sysctl kernel.unprivileged_userns_clone || true

      - name: "Scenario 1: deb install — sandboxed, no setuid binary"
        run: |
          set -ex
          sudo apt-get install -y ./dist/potacat_*.deb
          # Resolve the installed executable (electron-builder names it
          # after productName).
          BIN=$(find /opt -maxdepth 2 -type f \( -name 'POTACAT' -o -name 'potacat' \) | head -1)
          test -n "$BIN"
          EXE=$(basename "$BIN")
          echo "installed binary: $BIN"
          # The AppArmor profile must be installed and the helper must NOT
          # be setuid — this is the heart of issue #37.
          test -f "/etc/apparmor.d/$EXE"
          cat "/etc/apparmor.d/$EXE"
          PERMS=$(stat -c '%a %U' "$(dirname "$BIN")/chrome-sandbox")
          echo "chrome-sandbox: $PERMS"
          [ "$PERMS" = "755 root" ]
          test -z "$(find "$(dirname "$BIN")" -perm -4000)"
          # Launch headless as the unprivileged runner user. Alive at the
          # 25s kill (rc 124) = Chromium got past sandbox init.
          rm -rf ~/.config/POTACAT
          rc=0; timeout 25s xvfb-run -a "$BIN" --headless || rc=$?
          echo "exit code: $rc"
          [ "$rc" = "124" ]
          cat ~/.config/POTACAT/startup.log
          # Fully sandboxed — the fallback must NOT have fired.
          ! grep -F '[sandbox] WARNING' ~/.config/POTACAT/startup.log

      - name: "Scenario 2: deb with userns disabled (hardened-Debian sim)"
        run: |
          set -ex
          sudo sysctl -w kernel.unprivileged_userns_clone=0
          BIN=$(find /opt -maxdepth 2 -type f \( -name 'POTACAT' -o -name 'potacat' \) | head -1)
          rm -rf ~/.config/POTACAT
          rc=0; timeout 25s xvfb-run -a "$BIN" --headless || rc=$?
          echo "exit code: $rc"
          [ "$rc" = "124" ]
          cat ~/.config/POTACAT/startup.log
          grep -F '[sandbox] WARNING' ~/.config/POTACAT/startup.log
          sudo sysctl -w kernel.unprivileged_userns_clone=1

      - name: "Scenario 3: AppImage on Ubuntu 24.04 — fallback fires"
        run: |
          set -ex
          chmod +x dist/POTACAT-*.AppImage
          rm -rf ~/.config/POTACAT
          rc=0; timeout 25s xvfb-run -a dist/POTACAT-*.AppImage --headless || rc=$?
          echo "exit code: $rc"
          [ "$rc" = "124" ]
          cat ~/.config/POTACAT/startup.log
          grep -F '[sandbox] WARNING' ~/.config/POTACAT/startup.log
