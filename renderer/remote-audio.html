<!DOCTYPE html>
<html>
<head><title>ECHOCAT Audio Bridge</title></head>
<body>
<audio id="remote-playback" autoplay></audio>
<script>
// Hidden BrowserWindow — WebRTC audio bridge between radio USB audio and phone
let pc = null;
let localStream = null;     // rig USB audio MediaStream (getUserMedia)
let kiwiStream = null;      // synthesized MediaStream from KiwiSDR/WebSDR PCM
let kiwiCtx = null;         // AudioContext for the Kiwi audio graph
let kiwiDest = null;        // MediaStreamAudioDestinationNode → kiwiStream source
let kiwiNextPlayTime = 0;   // back-to-back scheduling cursor
let audioSender = null;     // RTCRtpSender for the audio track (used for replaceTrack)
let kiwiActive = false;     // mobile path: true → peer plays Kiwi audio
let freedvMuted = false; // persisted mute state for FreeDV
const audioEl = document.getElementById('remote-playback');

window.api.onStartAudio(async (config) => {
  try {
    // Clean up any previous session
    if (pc) { pc.close(); pc = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    audioEl.srcObject = null;

    // Capture radio's USB audio output (RX audio to send to phone)
    const baseAudio = {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false,
    };

    // Try specific device first, fall back to default if it fails
    if (config.inputDeviceId) {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          audio: { ...baseAudio, deviceId: { exact: config.inputDeviceId } },
        });
      } catch (e) {
        window.api.sendAudioStatus({ error: 'Configured audio input not found, using default: ' + e.message });
        localStream = await navigator.mediaDevices.getUserMedia({ audio: baseAudio });
      }
    } else {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: baseAudio });
    }

    // STUN enables NAT traversal for audio without VPN; empty = local/VPN only
    const iceServers = config.useStun ? [{ urls: 'stun:stun.l.google.com:19302' }] : [];
    pc = new RTCPeerConnection({ iceServers });

    // Apply FreeDV mute state to new stream (if engine was already active)
    if (freedvMuted) {
      localStream.getAudioTracks().forEach(t => { t.enabled = false; });
    }

    // Add radio RX audio track to send to phone. Remember the sender so we
    // can replaceTrack() later when KiwiSDR/WebSDR audio takes over without
    // having to renegotiate. (Gap 20a.)
    audioSender = null;
    for (const track of localStream.getTracks()) {
      const sender = pc.addTrack(track, localStream);
      if (track.kind === 'audio' && !audioSender) audioSender = sender;
    }

    // Start the audio-health monitor on the rig→phone stream so the
    // desktop can push audio-health: { ok: false } when the source
    // goes silent for ~5s. iOS auto-restarts on that signal.
    try { startHealthMonitor(localStream); }
    catch (e) { console.warn('[remote-audio] health monitor init failed:', e.message); }
    // If Kiwi was already active when WebRTC started, swap immediately.
    if (kiwiActive && audioSender) {
      const kiwiTrack = ensureKiwiTrack();
      if (kiwiTrack) {
        audioSender.replaceTrack(kiwiTrack).catch((e) => {
          window.api.sendAudioStatus({ error: 'Initial Kiwi track replace failed: ' + e.message });
        });
      }
    }

    // When phone's mic audio arrives, route to radio's USB audio input
    pc.ontrack = async (event) => {
      audioEl.srcObject = event.streams[0];
      // Route to specific output device (radio's USB audio input)
      if (config.outputDeviceId && typeof audioEl.setSinkId === 'function') {
        try {
          await audioEl.setSinkId(config.outputDeviceId);
        } catch (e) {
          window.api.sendAudioStatus({ error: 'Failed to set output device: ' + e.message });
        }
      }
      // PC-side TX peak meter — tap the incoming stream with an AnalyserNode
      // and push peaks to the VFO popout via main. The audio still plays
      // through the <audio> element above; this AudioContext is a parallel
      // analysis branch with a muted sink so the analyser pulls samples
      // without producing a second audible output.
      try { startTxMeter(event.streams[0]); }
      catch (e) { console.warn('[remote-audio] TX meter init failed:', e.message); }
    };

    // ICE candidates — relay to phone via main process
    // Must extract plain object — RTCIceCandidate getters are lost during IPC structured clone
    pc.onicecandidate = (event) => {
      if (event.candidate) {
        window.api.sendSignal({ type: 'ice', candidate: {
          candidate: event.candidate.candidate,
          sdpMid: event.candidate.sdpMid,
          sdpMLineIndex: event.candidate.sdpMLineIndex,
        }});
      }
    };

    pc.onconnectionstatechange = () => {
      const state = pc ? pc.connectionState : 'closed';
      window.api.sendAudioStatus({ connectionState: state });
    };

    // Create offer (we initiate)
    // Must extract plain object — RTCSessionDescription getters are lost during IPC structured clone
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    window.api.sendSignal({ type: 'sdp', sdp: {
      type: pc.localDescription.type,
      sdp: pc.localDescription.sdp,
    }});

    window.api.sendAudioStatus({ status: 'started' });
  } catch (err) {
    window.api.sendAudioStatus({ error: err.message });
  }
});

// Handle signaling from phone (relayed via main process)
window.api.onSignal(async (data) => {
  if (!pc || !data) return;

  try {
    if (data.type === 'sdp') {
      // Phone answer arrives as plain object (JSON over WS) — safe to pass directly
      await pc.setRemoteDescription(data.sdp);
      // If we received an offer (shouldn't happen since we initiate), create answer
      if (data.sdp.type === 'offer') {
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        window.api.sendSignal({ type: 'sdp', sdp: {
          type: pc.localDescription.type,
          sdp: pc.localDescription.sdp,
        }});
      }
    } else if (data.type === 'ice') {
      await pc.addIceCandidate(data.candidate);
    }
  } catch (err) {
    window.api.sendAudioStatus({ error: 'Signaling error: ' + err.message });
  }
});

// FreeDV mute — disable radio audio track so ECHOCAT hears silence instead of raw USB
window.api.onFreedvMute((muted) => {
  freedvMuted = muted;
  if (localStream) {
    localStream.getAudioTracks().forEach(t => { t.enabled = !muted; });
  }
});

// --- TX peak meter (PC-side) ---
// Taps the WebRTC track with an AnalyserNode in a parallel AudioContext. The
// analyser is connected to a 0-gain sink so it actually pulls samples without
// double-playing the audio (which the <audio> element already does). Peaks
// are pushed to main every 30ms and forwarded to the VFO popout's TX meter.
let _txMeterCtx = null;
let _txMeterTimer = null;
let _txMeterAnalyser = null;
function startTxMeter(stream) {
  stopTxMeter();
  if (!stream || !window.api.sendTxMeter) return;
  _txMeterCtx = new AudioContext();
  const source = _txMeterCtx.createMediaStreamSource(stream);
  const analyser = _txMeterCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0;
  const muted = _txMeterCtx.createGain();
  muted.gain.value = 0;
  source.connect(analyser);
  analyser.connect(muted);
  muted.connect(_txMeterCtx.destination);
  _txMeterAnalyser = analyser;
  const buf = new Float32Array(analyser.fftSize);
  _txMeterTimer = setInterval(() => {
    if (!_txMeterAnalyser) return;
    _txMeterAnalyser.getFloatTimeDomainData(buf);
    let peak = 0;
    for (let i = 0; i < buf.length; i++) { const v = Math.abs(buf[i]); if (v > peak) peak = v; }
    window.api.sendTxMeter(peak);
  }, 30);
}
function stopTxMeter() {
  if (_txMeterTimer) { clearInterval(_txMeterTimer); _txMeterTimer = null; }
  _txMeterAnalyser = null;
  if (_txMeterCtx) { _txMeterCtx.close().catch(() => {}); _txMeterCtx = null; }
  // Final 0 so the VFO popout's bar drops to idle on disconnect.
  if (window.api.sendTxMeter) window.api.sendTxMeter(0);
}

// --- Audio health monitor ---
// Watches the rig audio coming OUT of the bridge to the phone. If the
// peak energy stays at zero for 5 consecutive 1-second samples while
// audio is expected to be flowing, signal "silent" to main; main
// pushes audio-health to the iOS app so it can offer a Restart button
// (or auto-restart with the circuit breaker as backstop). On the next
// non-zero sample, signal "recovered".
//
// The TX meter already taps the same stream with 30 ms granularity for
// the VFO popout's TX bar; this is a separate, lower-frequency tap so
// the two don't fight.
let _healthCtx = null;
let _healthAnalyser = null;
let _healthTimer = null;
let _healthSilentCount = 0;
let _healthState = 'unknown'; // 'ok' | 'silent' | 'unknown'
const HEALTH_SILENT_THRESHOLD = 5; // 5 × 1s = 5 s of zero before flagging
const HEALTH_PEAK_FLOOR = 0.0005;  // below this is "no audio"

function startHealthMonitor(stream) {
  stopHealthMonitor();
  if (!stream || !window.api.sendAudioHealth) return;
  _healthCtx = new AudioContext();
  const source = _healthCtx.createMediaStreamSource(stream);
  _healthAnalyser = _healthCtx.createAnalyser();
  _healthAnalyser.fftSize = 1024;
  _healthAnalyser.smoothingTimeConstant = 0;
  const muted = _healthCtx.createGain();
  muted.gain.value = 0;
  source.connect(_healthAnalyser);
  _healthAnalyser.connect(muted);
  muted.connect(_healthCtx.destination);

  const buf = new Float32Array(_healthAnalyser.fftSize);
  _healthTimer = setInterval(() => {
    if (!_healthAnalyser) return;
    _healthAnalyser.getFloatTimeDomainData(buf);
    let peak = 0;
    for (let i = 0; i < buf.length; i++) {
      const v = Math.abs(buf[i]);
      if (v > peak) peak = v;
    }
    if (peak < HEALTH_PEAK_FLOOR) {
      _healthSilentCount++;
      if (_healthSilentCount >= HEALTH_SILENT_THRESHOLD && _healthState !== 'silent') {
        _healthState = 'silent';
        window.api.sendAudioHealth({ silent: true, reason: 'peak-zero-while-rx' });
      }
    } else {
      _healthSilentCount = 0;
      if (_healthState !== 'ok') {
        _healthState = 'ok';
        window.api.sendAudioHealth({ silent: false });
      }
    }
  }, 1000);
}
function stopHealthMonitor() {
  if (_healthTimer) { clearInterval(_healthTimer); _healthTimer = null; }
  _healthAnalyser = null;
  if (_healthCtx) { _healthCtx.close().catch(() => {}); _healthCtx = null; }
  _healthSilentCount = 0;
  _healthState = 'unknown';
}

// Cleanup
window.api.onStopAudio(() => {
  if (pc) { pc.close(); pc = null; }
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  tearDownKiwiGraph();
  audioSender = null;
  audioEl.srcObject = null;
  stopTxMeter();
  stopHealthMonitor();
  window.api.sendAudioStatus({ status: 'stopped' });
});

// --- KiwiSDR / WebSDR audio routing (Gap 20a) ---
// When the user connects to a Kiwi/WebSDR receiver, the desktop forwards
// PCM frames here. We feed them into a MediaStreamAudioDestinationNode and
// swap the WebRTC sender's track from rig audio → Kiwi stream so the phone
// hears SDR audio over the same WebRTC bridge it already uses for rig audio.
// No native Web Audio API needed on the mobile side.
// Persistent gain node between Kiwi BufferSources and the WebRTC
// destination. Lets us mute the SDR audio during TX without tearing
// down the audio graph (each PCM frame still creates a fresh
// BufferSource and connects to this gain). VK3AWA: hearing your own
// TX echoed through the remote SDR is unsettling.
let kiwiGain = null;
let kiwiTxMuted = false;

function ensureKiwiTrack() {
  if (kiwiStream && kiwiDest) {
    const tracks = kiwiStream.getAudioTracks();
    if (tracks.length) return tracks[0];
  }
  // Lazy-create on first frame so we don't open an AudioContext if nobody
  // ever connects an SDR. Default rate AudioContext + per-frame buffer
  // sample rate handles the variable Kiwi/WebSDR rates (8000–14238 Hz).
  if (!kiwiCtx) {
    kiwiCtx = new AudioContext();
  }
  if (!kiwiGain) {
    kiwiGain = kiwiCtx.createGain();
    kiwiGain.gain.value = kiwiTxMuted ? 0 : 1;
  }
  if (!kiwiDest) {
    kiwiDest = kiwiCtx.createMediaStreamDestination();
    kiwiGain.connect(kiwiDest);
  }
  kiwiStream = kiwiDest.stream;
  return kiwiStream.getAudioTracks()[0] || null;
}

function tearDownKiwiGraph() {
  kiwiNextPlayTime = 0;
  if (kiwiGain) {
    try { kiwiGain.disconnect(); } catch {}
    kiwiGain = null;
  }
  if (kiwiDest) {
    try { kiwiDest.disconnect(); } catch {}
    kiwiDest = null;
  }
  if (kiwiCtx) {
    kiwiCtx.close().catch(() => {});
    kiwiCtx = null;
  }
  kiwiStream = null;
}

window.api.onKiwiActive((active) => {
  kiwiActive = !!active;
  if (!pc || !audioSender) return; // peer not ready — handled in onStartAudio
  if (active) {
    const kiwiTrack = ensureKiwiTrack();
    if (kiwiTrack) {
      audioSender.replaceTrack(kiwiTrack).catch((e) => {
        window.api.sendAudioStatus({ error: 'Kiwi track replace failed: ' + e.message });
      });
    }
  } else {
    // Restore the rig audio track. localStream still holds it because we
    // only swapped at the sender, not the source.
    const rigTrack = localStream && localStream.getAudioTracks()[0];
    if (rigTrack) {
      audioSender.replaceTrack(rigTrack).catch((e) => {
        window.api.sendAudioStatus({ error: 'Rig track restore failed: ' + e.message });
      });
    }
  }
});

window.api.onKiwiAudioFrame((frame) => {
  if (!frame || !frame.pcm || !frame.pcm.length) return;
  const track = ensureKiwiTrack();
  if (!track || !kiwiCtx) return;
  // Cold-start: AudioContext can sit suspended until a user gesture in some
  // browsers. The remote-audio window is hidden — no gesture is coming —
  // but Electron's renderer doesn't enforce that policy. resume() is cheap.
  if (kiwiCtx.state === 'suspended') {
    kiwiCtx.resume().catch(() => {});
  }
  const sr = frame.sampleRate || 12000;
  const pcm = new Float32Array(frame.pcm);
  const buf = kiwiCtx.createBuffer(1, pcm.length, sr);
  buf.getChannelData(0).set(pcm);
  const src = kiwiCtx.createBufferSource();
  src.buffer = buf;
  // Route through the gain node so a TX-mute affects every frame.
  src.connect(kiwiGain || kiwiDest);
  // Schedule packets back-to-back. Cap the cursor at 500 ms ahead of now —
  // a network burst can otherwise leave us seconds behind real time.
  const now = kiwiCtx.currentTime;
  if (kiwiNextPlayTime < now || kiwiNextPlayTime > now + 0.5) {
    kiwiNextPlayTime = now;
  }
  src.start(kiwiNextPlayTime);
  kiwiNextPlayTime += pcm.length / sr;
});

// TX-mute for the WebRTC-bridged SDR audio path. Mirror of the
// kiwiGainNode mute the desktop VFO popout has had since v1.5.14.
// Without this, mobile listeners hear their own TX echoed through
// the remote SDR for the duration of TX. Track the state even when
// kiwiGain isn't yet created so the very first frame after a hot
// PTT lands at the correct gain.
window.api.onTxState((state) => {
  kiwiTxMuted = !!state;
  if (kiwiGain) kiwiGain.gain.value = kiwiTxMuted ? 0 : 1;
  // SmartSDR-direct path needs the same TX-mute so the mobile listener
  // doesn't hear their own TX echoed back through the Flex receiver.
  if (smartGain) smartGain.gain.value = kiwiTxMuted ? 0 : 1;
});

// --- SmartSDR DAX-free audio path -------------------------------------
// Receives Opus-encoded VITA-49 audio from the Flex via main, decodes
// using Chromium's WebCodecs AudioDecoder (no native dep, no npm
// addon), and feeds the PCM into a synthetic MediaStream that takes
// the place of the DAX-sourced rig audio at the WebRTC sender.
//
// Architecture mirrors the Kiwi/WebSDR path above: persistent gain
// node so TX-mute can silence it during transmit, MediaStreamAudio-
// DestinationNode produces the .stream we hand to replaceTrack().
let smartCtx = null;
let smartDest = null;
let smartStream = null;
let smartGain = null;
let smartDecoder = null;
let smartNextPlayTime = 0;
let smartActive = false;
let smartFrameTs = 0; // monotonic µs counter for WebCodecs frame ordering

function ensureSmartTrack() {
  if (smartStream && smartDest) {
    const tracks = smartStream.getAudioTracks();
    if (tracks.length) return tracks[0];
  }
  if (!smartCtx) smartCtx = new AudioContext();
  if (!smartGain) {
    smartGain = smartCtx.createGain();
    smartGain.gain.value = kiwiTxMuted ? 0 : 1; // share TX-mute state
  }
  if (!smartDest) {
    smartDest = smartCtx.createMediaStreamDestination();
    smartGain.connect(smartDest);
  }
  smartStream = smartDest.stream;
  return smartStream.getAudioTracks()[0] || null;
}

function tearDownSmartGraph() {
  smartNextPlayTime = 0;
  smartFrameTs = 0;
  smartActive = false;
  if (smartDecoder) {
    try { smartDecoder.close(); } catch {}
    smartDecoder = null;
  }
  if (smartGain) {
    try { smartGain.disconnect(); } catch {}
    smartGain = null;
  }
  if (smartDest) {
    try { smartDest.disconnect(); } catch {}
    smartDest = null;
  }
  if (smartCtx) {
    smartCtx.close().catch(() => {});
    smartCtx = null;
  }
  smartStream = null;
}

function ensureSmartDecoder() {
  if (smartDecoder) return smartDecoder;
  if (typeof AudioDecoder === 'undefined') {
    window.api.sendAudioStatus({ error: 'WebCodecs AudioDecoder unavailable in this Electron build — SmartSDR audio path needs Chromium 94+.' });
    return null;
  }
  smartDecoder = new AudioDecoder({
    output: (audioData) => {
      try {
        if (!smartCtx || !smartDest) return;
        // AudioData → Float32Array PCM. Flex audio is mono Opus at
        // 24 kHz; allocate a buffer of that exact shape and copy.
        const numFrames = audioData.numberOfFrames;
        const sr = audioData.sampleRate;
        const pcm = new Float32Array(numFrames);
        audioData.copyTo(pcm, { planeIndex: 0, format: 'f32' });
        audioData.close();
        if (smartCtx.state === 'suspended') smartCtx.resume().catch(() => {});
        const buf = smartCtx.createBuffer(1, numFrames, sr);
        buf.getChannelData(0).set(pcm);
        const src = smartCtx.createBufferSource();
        src.buffer = buf;
        src.connect(smartGain || smartDest);
        const now = smartCtx.currentTime;
        if (smartNextPlayTime < now || smartNextPlayTime > now + 0.5) {
          smartNextPlayTime = now;
        }
        src.start(smartNextPlayTime);
        smartNextPlayTime += numFrames / sr;
      } catch (err) {
        window.api.sendAudioStatus({ error: 'SmartSDR audio output failed: ' + err.message });
      }
    },
    error: (err) => {
      window.api.sendAudioStatus({ error: 'SmartSDR audio decode error: ' + err.message });
    },
  });
  smartDecoder.configure({
    codec: 'opus',
    sampleRate: 24000,
    numberOfChannels: 1,
  });
  return smartDecoder;
}

window.api.onSmartSdrAudioFrame((frame) => {
  if (!frame || !frame.opus) return;
  const track = ensureSmartTrack();
  if (!track) return;
  const dec = ensureSmartDecoder();
  if (!dec) return;
  // First frame triggers the WebRTC sender swap from rig (DAX) audio
  // to the synthetic SmartSDR-direct stream. From here on, the phone
  // hears Flex audio without DAX in the path.
  if (!smartActive && pc && audioSender) {
    smartActive = true;
    audioSender.replaceTrack(track).catch((e) => {
      window.api.sendAudioStatus({ error: 'SmartSDR track replace failed: ' + e.message });
      smartActive = false;
    });
  }
  try {
    // Flex frames are 20 ms Opus at 24 kHz; advance the µs cursor by
    // that fixed amount per frame so WebCodecs gets monotonically
    // increasing timestamps even if the source clock drifts.
    dec.decode(new EncodedAudioChunk({
      type: 'key', // Opus frames are independently decodable
      timestamp: smartFrameTs,
      data: new Uint8Array(frame.opus),
    }));
    smartFrameTs += 20_000;
  } catch (err) {
    window.api.sendAudioStatus({ error: 'SmartSDR audio decode submit failed: ' + err.message });
  }
});

window.api.onSmartSdrAudioFallback(() => {
  // Subscription protocol succeeded but no audio packets in 5 s.
  // Tear the synthetic graph down and let the existing DAX-sourced
  // localStream stay on the WebRTC sender.
  tearDownSmartGraph();
  if (pc && audioSender && localStream) {
    const rigTrack = localStream.getAudioTracks()[0];
    if (rigTrack) {
      audioSender.replaceTrack(rigTrack).catch(() => {});
    }
  }
});
</script>
</body>
</html>
