<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="popout-theme-boot.js"></script>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>Log QSO</title>
  <script src="popout-theme-bootstrap.js"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* All var() references use names that ARE defined in styles.css for both
       dark and light themes:
         --bg-secondary / --bg-primary / --bg-input / --bg-hover
         --border-primary / --border-secondary
         --text-primary / --text-secondary / --text-tertiary
         --accent-blue / --accent-green-btn / --accent-red / --source-sota
       Earlier this file used --bg-header, --border, --text-muted, --accent-gold —
       none defined anywhere — so the fallbacks (dark hexes) painted regardless
       of theme and the popout looked dark in light mode. Casey 2026-05-03. */

    /* Frameless title bar — matches other pop-outs (vfo-popout, qso-popout) */
    .lp-titlebar {
      -webkit-app-region: drag;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: var(--bg-secondary, #16213e);
      border-bottom: 1px solid var(--border-primary, #333);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary, #e0e0e0);
    }
    .lp-titlebar .lp-titlebar-controls {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 4px;
    }
    .lp-titlebar button {
      background: none;
      border: 1px solid var(--border-primary, #333);
      color: var(--text-secondary, #888);
      width: 22px;
      height: 22px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      border-radius: 3px;
    }
    .lp-titlebar button:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* Body sections */
    body { background: var(--bg-primary, #1a1a2e); color: var(--text-primary, #e0e0e0); margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }
    .lp-body { padding: 10px 14px 14px; }
    /* flex-wrap lets the side-by-side fields stack on narrow widths so the
       window can be shrunk well below the form's natural width without
       clipping (W9TEF feedback 2026-05-07). min-width on labels keeps each
       field at a usable size before it forces the next field to a new row. */
    .lp-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .lp-row > label { flex: 1 1 120px; min-width: 110px; display: flex; flex-direction: column; font-size: 11px; color: var(--text-secondary); }
    .lp-row > label > input,
    .lp-row > label > select { margin-top: 3px; padding: 4px 6px; font-size: 13px; background: var(--bg-input, #0f1419); border: 1px solid var(--border-primary, #333); color: var(--text-primary); border-radius: 3px; }
    .lp-row > label > input[readonly] { color: var(--text-tertiary); background: transparent; border-color: var(--border-primary); }

    /* Callsign + QRZ row */
    .lp-call-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
    .lp-call-row > label { flex: 1 1 140px; min-width: 120px; display: flex; flex-direction: column; font-size: 11px; color: var(--text-secondary); }
    .lp-call-row > label > input { margin-top: 3px; padding: 4px 6px; font-size: 14px; font-weight: 600; background: var(--bg-input, #0f1419); border: 1px solid var(--border-primary, #333); color: var(--text-primary); border-radius: 3px; text-transform: uppercase; }
    /* QRZ button — black text passes contrast on both themes (13:1 against
       light-cyan dark-mode #4fc3f7, 5:1 against royal-blue light-mode #1976d2). */
    #lp-qrz-link { padding: 5px 10px; font-size: 12px; font-weight: 600; background: var(--accent-blue, #4fc3f7); color: #000; border: none; border-radius: 3px; cursor: pointer; opacity: 0.5; pointer-events: none; transition: opacity 0.15s; }
    #lp-qrz-link.active { opacity: 1; pointer-events: auto; }
    #lp-qrz-link:hover.active { filter: brightness(1.1); }

    /* Identity row (Name · Country/State · Beam 087°) */
    #lp-identity { font-size: 12px; color: var(--accent-green, #4ecca3); min-height: 16px; margin-top: 4px; padding-left: 2px; }
    #lp-identity .lp-loc { color: var(--text-secondary); margin-left: 4px; }
    #lp-identity .lp-beam { color: var(--accent-blue, #4fc3f7); margin-left: 6px; font-variant-numeric: tabular-nums; }

    /* Type chips */
    .lp-chips { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .lp-chip { padding: 4px 12px; background: var(--bg-input, #0f1419); border: 1px solid var(--border-primary, #333); color: var(--text-secondary); font-size: 12px; border-radius: 14px; cursor: pointer; }
    .lp-chip:hover { background: var(--bg-hover); color: var(--text-primary); }
    .lp-chip.active { background: var(--accent-red, #e94560); color: #fff; border-color: var(--accent-red); }

    .lp-ref-section { margin-top: 6px; }
    .lp-ref-section.hidden { display: none; }

    .lp-rst-input { width: 100%; padding: 4px 6px; font-size: 13px; font-variant-numeric: tabular-nums; background: var(--bg-input, #0f1419); border: 1px solid var(--border-primary, #333); color: var(--text-primary); border-radius: 3px; }
    .lp-notes-input { width: 100%; padding: 4px 6px; font-size: 13px; background: var(--bg-input, #0f1419); border: 1px solid var(--border-primary, #333); color: var(--text-primary); border-radius: 3px; box-sizing: border-box; }

    /* Buttons */
    .lp-buttons { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
    .lp-buttons button { padding: 6px 14px; font-size: 13px; border: 1px solid var(--border-primary, #333); background: var(--bg-input, #0f1419); color: var(--text-primary); border-radius: 3px; cursor: pointer; }
    .lp-buttons button:hover { background: var(--bg-hover); }
    /* Save QSO — use --accent-green-btn (the non-themed mint #4ecca3) so the
       button looks the same on both themes and black text passes contrast. The
       previous --accent-green is dark forest in light mode and made the button
       unreadable. */
    #lp-save { background: var(--accent-green-btn, #4ecca3); color: #000; border-color: var(--accent-green-btn, #4ecca3); font-weight: 600; }
    #lp-save:hover { filter: brightness(1.1); }
    #lp-save:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Toast (saved confirmation) */
    #lp-toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--accent-green-btn, #4ecca3); color: #000; padding: 8px 18px; font-size: 13px; font-weight: 600; border-radius: 4px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100; }
    #lp-toast.visible { opacity: 1; }

    /* Past QSOs panel — collapsible header (W9TEF 2026-05-02). The whole
       title row is clickable; a caret glyph signals current state. Body is
       wrapped in an overflow-x:auto container so a narrow window scrolls
       the table horizontally instead of clipping the date/time column. */
    .lp-past { margin-top: 18px; padding-top: 12px; border-top: 1px solid var(--border-primary, #333); }
    .lp-past-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 8px; }
    .lp-past-title { font-size: 12px; font-weight: 600; color: var(--text-primary); cursor: pointer; user-select: none; flex: 1; }
    .lp-past-title:hover { color: var(--accent-blue, #4fc3f7); }
    .lp-past-title .lp-caret { display: inline-block; width: 10px; color: var(--text-secondary); margin-right: 2px; }
    .lp-past-title .lp-count { color: var(--text-secondary); font-weight: normal; margin-left: 4px; }
    .lp-past.collapsed #lp-past-body { display: none; }
    .lp-past-link { font-size: 11px; color: var(--accent-blue, #4fc3f7); cursor: pointer; text-decoration: none; }
    .lp-past-link:hover { text-decoration: underline; }
    .lp-past-empty { font-size: 12px; color: var(--text-secondary); font-style: italic; padding: 4px 0; }
    .lp-past-scroll { overflow-x: auto; }
    .lp-past-table { width: 100%; border-collapse: collapse; font-size: 11px; font-variant-numeric: tabular-nums; }
    .lp-past-table td { padding: 3px 6px 3px 0; border-bottom: 1px solid var(--border-secondary, #1f1f2e); color: var(--text-primary); white-space: nowrap; vertical-align: top; }
    .lp-past-table td.lp-past-when { padding-right: 10px; }
    .lp-past-table td.lp-past-comment { white-space: normal; color: var(--text-secondary); font-style: italic; }
    .lp-past-table tr:last-child td { border-bottom: none; }
    .lp-past-table .lp-past-mode { color: var(--accent-blue); }
    .lp-past-table .lp-past-ref { color: var(--source-sota, #f0a500); }
  </style>
</head>
<body>
  <div class="lp-titlebar">
    <span>Log QSO</span>
    <div class="lp-titlebar-controls">
      <button id="lp-min" title="Minimize">&minus;</button>
      <button id="lp-close" title="Close">&times;</button>
    </div>
  </div>

  <div class="lp-body">
    <!-- Callsign + name + QRZ link -->
    <div class="lp-call-row">
      <label>Callsign
        <input type="text" id="lp-callsign" maxlength="60" autocomplete="off" spellcheck="false" placeholder="e.g. K0OTC">
      </label>
      <label style="flex:1.4;">Name
        <input type="text" id="lp-name" readonly tabindex="-1">
      </label>
      <button id="lp-qrz-link" type="button" title="Open QRZ.com page">QRZ&#8599;</button>
    </div>
    <div id="lp-identity"></div>

    <!-- Type chips -->
    <div class="lp-chips">
      <button type="button" class="lp-chip active" data-type="dx">DX</button>
      <button type="button" class="lp-chip" data-type="pota">POTA</button>
      <button type="button" class="lp-chip" data-type="sota">SOTA</button>
      <button type="button" class="lp-chip" data-type="wwff">WWFF</button>
      <button type="button" class="lp-chip" data-type="llota">LLOTA</button>
    </div>
    <div id="lp-ref-section" class="lp-ref-section hidden">
      <label style="font-size:11px;color:var(--text-secondary);">Reference
        <input type="text" id="lp-ref" placeholder="e.g. US-1234" autocomplete="off" spellcheck="false" style="text-transform:uppercase;width:100%;padding:4px 6px;font-size:13px;background:var(--bg-input,#0f1419);border:1px solid var(--border-primary,#333);color:var(--text-primary);border-radius:3px;box-sizing:border-box;margin-top:3px;">
      </label>
    </div>

    <!-- Re-spot section — visible only for types with a respot endpoint
         (POTA / WWFF / LLOTA). Default checked (mirrors the spot-row Log
         dialog and BL); user can uncheck for one-off logs that shouldn't
         spam the network. Comment template persists between logs. -->
    <div id="lp-respot-section" class="hidden" style="margin-top:6px;border-top:1px solid var(--border-primary,#333);padding-top:6px;">
      <label class="lp-respot-label" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);">
        <input type="checkbox" id="lp-respot" checked>
        <span id="lp-respot-text">Re-spot the activator on the network</span>
      </label>
      <input type="text" id="lp-respot-comment" placeholder="Comment for the spot" style="width:100%;padding:4px 6px;font-size:12px;background:var(--bg-input,#0f1419);border:1px solid var(--border-primary,#333);color:var(--text-primary);border-radius:3px;box-sizing:border-box;margin-top:4px;">
    </div>

    <!-- Frequency / mode -->
    <div class="lp-row">
      <label>Frequency (kHz)
        <input type="text" id="lp-frequency" inputmode="decimal">
      </label>
      <label>Mode
        <select id="lp-mode">
          <option value="CW">CW</option>
          <option value="SSB">SSB</option>
          <option value="USB">USB</option>
          <option value="LSB">LSB</option>
          <option value="FT8">FT8</option>
          <option value="FT4">FT4</option>
          <option value="FM">FM</option>
          <option value="AM">AM</option>
          <option value="RTTY">RTTY</option>
        </select>
      </label>
    </div>

    <!-- Date / time -->
    <div class="lp-row">
      <label>Date (UTC)
        <input type="date" id="lp-date">
      </label>
      <label>Time (UTC)
        <input type="text" id="lp-time" placeholder="HH:MM" maxlength="5" pattern="\d{2}:\d{2}" style="font-variant-numeric:tabular-nums;">
      </label>
    </div>

    <!-- Power -->
    <div class="lp-row">
      <label>Power (W)
        <input type="number" id="lp-power" min="1" max="5000">
      </label>
      <label>RST Sent
        <input type="text" class="lp-rst-input" id="lp-rst-sent" maxlength="3" inputmode="numeric" value="59">
      </label>
      <label>RST Rcvd
        <input type="text" class="lp-rst-input" id="lp-rst-rcvd" maxlength="3" inputmode="numeric" value="59">
      </label>
    </div>

    <!-- Notes -->
    <label style="display:block;margin-top:6px;font-size:11px;color:var(--text-secondary);">Notes
      <input type="text" class="lp-notes-input" id="lp-notes" placeholder="Optional" autocomplete="off" spellcheck="true" style="margin-top:3px;">
    </label>

    <!-- Buttons -->
    <div class="lp-buttons">
      <button type="button" id="lp-clear">Clear</button>
      <button type="button" id="lp-save">Save QSO</button>
    </div>

    <!-- Past QSOs -->
    <div class="lp-past" id="lp-past">
      <div class="lp-past-header">
        <div class="lp-past-title" id="lp-past-title" role="button" tabindex="0" title="Show or hide past QSOs">
          <span class="lp-caret" id="lp-past-caret">&#9662;</span>Past QSOs <span id="lp-past-count" class="lp-count"></span>
        </div>
        <a href="#" id="lp-past-view-all" class="lp-past-link" style="display:none;">View all in Logbook &rarr;</a>
      </div>
      <div id="lp-past-body">
        <div class="lp-past-empty">Type a callsign to see prior QSOs from your log.</div>
      </div>
    </div>
  </div>

  <div id="lp-toast"></div>

  <script src="log-popout.js"></script>
</body>
</html>
