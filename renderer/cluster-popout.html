<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="popout-theme-boot.js"></script>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>DX Cluster Terminal</title>
  <script src="popout-theme-bootstrap.js"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary); }
    body { display: flex; flex-direction: column; color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; }

    .node-tabs {
      display: flex; align-items: center; gap: 0; padding: 0 8px;
      background: var(--bg-secondary); border-bottom: 1px solid var(--border-primary);
      flex-shrink: 0; min-height: 30px; overflow-x: auto;
    }
    .node-tab {
      padding: 5px 14px; cursor: pointer; font-size: 12px; font-weight: 600;
      color: var(--text-secondary); border-bottom: 2px solid transparent;
      white-space: nowrap; user-select: none; transition: color 0.15s, border-color 0.15s;
    }
    .node-tab:hover { color: var(--text-primary); }
    .node-tab.active { color: var(--accent-blue, #4fc3f7); border-bottom-color: var(--accent-blue, #4fc3f7); }
    .node-tab .tab-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      margin-right: 5px; vertical-align: middle;
    }
    .node-tab .tab-dot.connected { background: #4ecca3; }
    .node-tab .tab-dot.disconnected { background: #e94560; }
    .no-nodes-msg {
      padding: 5px 14px; font-size: 12px; color: var(--text-tertiary);
    }

    .terminal-wrap { flex: 1; min-height: 0; overflow-y: auto; padding: 6px 10px; }
    #terminal {
      font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
      line-height: 1.5; white-space: pre-wrap; word-wrap: break-word;
      color: var(--text-primary);
    }
    .term-line-spot { color: #e040fb; }
    .term-line-clickable { cursor: pointer; border-radius: 2px; transition: background 0.15s; }
    .term-line-clickable:hover { background: rgba(224, 64, 251, 0.15); }
    .term-line-cmd { color: #4fc3f7; }

    .cmd-bar {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      background: var(--bg-secondary); border-top: 1px solid var(--border-primary);
      flex-shrink: 0;
    }
    .cmd-bar input {
      flex: 1; padding: 5px 8px; background: var(--bg-input, #0d1117); border: 1px solid var(--border-primary);
      border-radius: 4px; color: var(--text-primary);
      font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
    }
    .cmd-bar input:focus { outline: none; border-color: var(--accent-blue, #4fc3f7); }
    .cmd-bar button {
      padding: 5px 12px; background: var(--bg-input, #0d1117); border: 1px solid var(--border-primary);
      border-radius: 4px; color: var(--text-primary); cursor: pointer; font-size: 12px;
    }
    .cmd-bar button:hover { background: var(--bg-hover); }

    .help-panel {
      position: absolute; bottom: 38px; left: 0; right: 0;
      max-height: 60%; overflow-y: auto;
      background: var(--bg-secondary); border-top: 1px solid var(--border-primary);
      padding: 10px 14px; z-index: 10;
      font-size: 12px;
    }
    .help-section { margin-bottom: 10px; }
    .help-section-title { font-weight: 700; color: var(--text-secondary); margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .help-row {
      display: flex; align-items: baseline; gap: 10px; padding: 2px 0;
    }
    .help-cmd {
      font-family: 'Consolas', 'Courier New', monospace; color: #e040fb;
      cursor: pointer; white-space: nowrap; border-radius: 2px; padding: 1px 4px;
      transition: background 0.15s;
    }
    .help-cmd:hover { background: rgba(224, 64, 251, 0.15); }
    .help-desc { color: var(--text-tertiary); }
    .help-btn {
      width: 26px; height: 26px; font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .help-btn.active { color: #e040fb; border-color: #e040fb; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-title">DX Cluster Terminal</div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="tb-min" title="Minimize">&#x2014;</button>
      <button class="titlebar-btn" id="tb-max" title="Maximize">&#x25A1;</button>
      <button class="titlebar-btn titlebar-close" id="tb-close" title="Close">&#x2715;</button>
    </div>
  </div>
  <div class="node-tabs" id="node-tabs">
    <span class="no-nodes-msg" id="no-nodes-msg">No cluster nodes connected</span>
  </div>
  <div class="terminal-wrap" id="terminal-wrap">
    <div id="terminal"></div>
  </div>
  <div id="help-panel" class="help-panel hidden"></div>
  <div class="cmd-bar">
    <button id="cmd-help" class="help-btn" title="Command reference">?</button>
    <input type="text" id="cmd-input" placeholder="Type a command..." autocomplete="off" spellcheck="false">
    <button id="cmd-send">Send</button>
  </div>

  <script src="cluster-popout.js"></script>
</body>
</html>
